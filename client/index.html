<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebVoxel</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.y = 5;
camera.position.z = 10;

let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

let ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// Blok materyali
let blockMaterial = new THREE.MeshStandardMaterial({ color: 0x55aa55 });

// Zemin oluştur (16x16)
for(let x=-8; x<8; x++){
  for(let z=-8; z<8; z++){
    let geometry = new THREE.BoxGeometry(1,1,1);
    let cube = new THREE.Mesh(geometry, blockMaterial);
    cube.position.set(x,0,z);
    scene.add(cube);
  }
}

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function animate() {
  requestAnimationFrame(animate);

  if(keys["w"]) camera.position.z -= 0.1;
  if(keys["s"]) camera.position.z += 0.1;
  if(keys["a"]) camera.position.x -= 0.1;
  if(keys["d"]) camera.position.x += 0.1;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
